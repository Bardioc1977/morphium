name: Build

on:
  workflow_dispatch:
  push:
    branches: ["develop"]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy-docs.yml'
      - '.github/workflows/sync-wiki.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Trigger quarkus-morphium rebuild
        if: github.ref == 'refs/heads/develop'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.QUARKUS_MORPHIUM_DISPATCH_TOKEN }}
          repository: Bardioc1977/quarkus-morphium
          event-type: dependency-updated
          client-payload: '{"source": "morphium", "sha": "${{ github.sha }}"}'

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7
